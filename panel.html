<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Panel</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700">
    <link rel="stylesheet" href="panel.css">
</head>

<body>
    <div class="pricingPlanTable">

        <div class="pricingPlan">
            <img src="icons/icon1.png" alt="" class="pricing-img">
            <h2 class="pricingHeader">Personal</h2>
            <ul class="pricingFeature">
                <li class="pricingFeatureItems">15 Free Storage</li>
                <li class="pricingFeatureItems">100 Free Requests Per months</li>

            </ul>

            <span class="price">Free</span>
            <a href="#/" class="pricingButton">Sign Up</a>
        </div>

        <div class="pricingPlan">
            <img src="icons/icon2.png" alt="" class="pricing-img">
            <h2 class="pricingHeader">Pro</h2>
            <ul class="pricingFeature">
                <li class="pricingFeatureItems">100 Free Storage</li>
                <li class="pricingFeatureItems">10000 Free Requests Per months</li>
                <li class="pricingFeatureItems">Intellisense Included</li>
            </ul>
            <span class="price">$50</span>
            <a href="#/" class="pricingButton  is-featured">Free Trial</a>
        </div>

        <div class="pricingPlan">
            <img src="icons/icon3.png" alt="" class="pricing-img">
            <h2 class="pricingHeader">Max</h2>
            <ul class="pricingFeature">
                <li class="pricingFeatureItems">500 Free Storage</li>
                <li class="pricingFeatureItems">Unlimited Free Requests Per months</li>
                <li class="pricingFeatureItems">Intellisense Included</li>
            </ul>
            <span class="price">$100</span>
            <a href="#/" class="pricingButton">Free Trial</a>
        </div>




    </div>


</body>

</html>
